name: nhom3-healthyapp


services:
  frontend:
    image: phamducthanh/nhom3-healthyapp-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:4000
    depends_on:
      - backend

  backend:
    image: phamducthanh/nhom3-healthyapp-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
